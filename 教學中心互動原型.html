function search(q,k=6){const qg=grams(q),n=docs.length,out=[];
  idx.forEach((d,i)=>{let s=0;for(const g in qg){if(d[g])s+=qg[g]*d[g]*Math.log(n/(df[g]||1)+1)}
    if(s>0&&q.includes(meta[i].title))s+=100; // 標題精確命中加權
    if(s>0)out.push([s,i])});
  out.sort((a,b)=>b[0]-a[0]);return out.slice(0,k).map(([s,i])=>meta[i])}
function showTerm(t){const g=byTerm[t];if(!g)return;
  document.getElementById('pTitle').textContent=g.term;
  document.getElementById('pDef').textContent=g.definition;
  document.getElementById('pSrc').textContent='出處:'+g.source_ref;
  document.getElementById('pRel').innerHTML='相關:'+g.related.map(r=>'<span onclick="showTerm(\''+r+'\')">'+r+'</span>').join('');
  pop.classList.add('show')}
document.getElementById('search').oninput=e=>{
  const q=e.target.value.trim(),R=document.getElementById('results');
  if(q.length<2){R.innerHTML='';return}
  R.innerHTML=search(q).map(m=>'<div class="hit" onclick="'+(m.g?'showTerm(\''+m.title+'\')':'')+'"><b>'+m.title+'</b> <span style="font-size:11px;opacity:.5">'+m.kind+'</span><br><span style="font-size:13px">'+m.text.slice(0,60)+'…</span><div class="src">'+m.src+'</div></div>').join('')||'<div class="hit">查無結果——問 AI 顧問(V2 接入)</div>'}
// 學習路徑
const path=document.getElementById('path');
DATA.lessons.forEach((lv,li)=>{
  const d=document.createElement('div');d.className='lvl';
  d.innerHTML='<b>'+lv.level+'('+lv.items.length+' 課)'+(li===0?' — 建議從這裡開始':'')+'</b>';
  const wrap=document.createElement('div');wrap.style.display=li===0?'block':'none';
  lv.items.forEach((it,k)=>{const l=document.createElement('div');l.className='lesson';
    l.innerHTML='<span class="prog">'+ (k+1) +'</span> '+linkTerms(it.title)+'<div class="sum">'+linkTerms(it.summary)+'</div>';
    l.onclick=e=>{if(e.target.classList.contains('term'))return;l.classList.toggle('open')};wrap.appendChild(l)});
  d.querySelector('b').onclick=()=>wrap.style.display=wrap.style.display==='none'?'block':'none';
  d.appendChild(wrap);path.appendChild(d)});
// 名詞自動高亮
function linkTerms(s){let out=s;
  for(const t of Object.keys(byTerm).sort((a,b)=>b.length-a.length))
    out=out.split(t).join(''+t+'');
  return out.replace(//g,'<span class="term" onclick="showTerm(this.textContent)">').replace(//g,'</span>')}
// 名詞庫瀏覽
document.getElementById('glossaryList').innerHTML=DATA.glossary.map(g=>
 '<div class="lesson" onclick="showTerm(\''+g.term+'\')"><b style="font-family:\'Noto Serif TC\',serif">'+g.term+'</b> <span style="font-size:12px;opacity:.6">'+g.definition.slice(0,28)+'…</span></div>').join('');
</script></body></html>
