<title>金錢卦</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#8C6D3F;--gold2:#C9A96A;--ink:#2b2418;--card:#fffdf7;--red:#A63A2E;--green:#4A6B4F;--bg:#f4efe4;--pur:#8e6bb5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);padding:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
h1{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--gold)}
.box{background:var(--card);border:1px solid #e6dcc3;border-radius:16px;padding:12px 14px;width:min(560px,96vw);box-shadow:0 2px 10px rgba(120,90,40,.08)}
.chip{border:1px solid var(--gold);border-radius:999px;padding:8px 16px;font-size:15px;cursor:pointer;background:transparent;color:var(--ink)}
.chip.on{background:var(--gold);color:#fff}
.big{background:var(--gold);color:#fff;border:0;border-radius:14px;padding:14px 22px;font-size:17px;font-weight:700;cursor:pointer;width:100%;box-shadow:0 4px 14px rgba(140,109,63,.35)}
.coin{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#E8D9A8,#C9A96A 60%,#8C6D3F);display:inline-flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-weight:900;font-size:17px;color:#5a4520;box-shadow:0 3px 8px rgba(0,0,0,.25);margin:0 5px}
.yline{display:flex;align-items:center;gap:10px;margin:3px 0;font-size:13.5px}
.bar{display:flex;gap:8px;width:120px;height:12px}
.bar div{background:var(--ink);border-radius:3px;flex:1;height:100%}
.bar.mov div{background:var(--red)}
.tag{display:inline-block;border-radius:99px;padding:1px 10px;font-size:12px;margin:1px 3px 1px 0;background:#f2ead6;color:#6b5427}
.sec{border-top:1px dashed rgba(160,140,90,.35);margin:10px 0 6px;padding-top:8px}
.yw{font-family:'Noto Serif TC',serif;font-size:15.5px;line-height:1.85}
.hl{background:rgba(201,169,106,.22);border-left:3px solid var(--gold);padding:6px 10px;border-radius:0 8px 8px 0;margin:4px 0}
select{padding:7px 9px;border:1.5px solid var(--gold2);border-radius:10px;background:#fff;color:var(--ink);font-size:14px}
.note{font-size:12px;opacity:.65;margin-top:6px}
</style></head><body>
<h1>🪙 金錢卦</h1>
<div class="box">
<div style="font-size:14px;line-height:1.8">心中<b>默念所問之事</b>(一事一問,愈具體愈好),誠心後開始。三枚銅錢擲六次,由下而上裝卦。</div>
<div style="display:flex;gap:8px;margin-top:8px">
<button class="chip on" id="mAuto">📱 手機擲卦</button>
<button class="chip" id="mHand">🪙 真銅錢記錄</button>
</div>
<div id="autoBox" style="margin-top:10px;text-align:center">
 <div id="coins" style="min-height:56px;margin:6px 0"></div>
 <button class="big" id="throwBtn">擲 第 1 爻(共六爻)</button>
</div>
<div id="handBox" style="display:none;margin-top:10px">
 <div style="font-size:13px;opacity:.75;margin-bottom:6px">實際擲真銅錢,逐爻記錄(由下而上)。背=有國號那面。</div>
 <div id="handSel"></div>
 <button class="big" id="handGo" style="margin-top:8px">起卦</button>
</div>
<div id="lines" style="margin-top:10px"></div>
<button class="chip" id="resetBtn" style="display:none;margin-top:6px">↺ 重新起卦</button>
</div>
<div class="box" id="result" style="display:none"></div>
<div class="note" style="max-width:540px">卦爻辭為《周易》通行本原文;吉凶提示與白話僅供參考,重大決策請洽抱朴隨緣堂詳斷。占卦貴誠,一事不二問。</div>
<script>
// ── 周易六十四卦 卦辭+爻辭(通行本原文;乾坤含用九用六)──
const ZY={

'屯':{g:'元亨利貞。勿用有攸往,利建侯。',y:['磐桓,利居貞,利建侯。','屯如邅如,乘馬班如。匪寇,婚媾,女子貞不字,十年乃字。','即鹿无虞,惟入于林中。君子幾,不如舍,往吝。','乘馬班如,求婚媾,往吉,无不利。','屯其膏,小貞吉,大貞凶。','乘馬班如,泣血漣如。']},
'蒙':{g:'亨。匪我求童蒙,童蒙求我。初筮告,再三瀆,瀆則不告。利貞。',y:['發蒙,利用刑人,用說桎梏;以往吝。','包蒙,吉。納婦,吉;子克家。','勿用取女,見金夫,不有躬,无攸利。','困蒙,吝。','童蒙,吉。','擊蒙,不利為寇,利禦寇。']},
'需':{g:'有孚,光亨,貞吉。利涉大川。',y:['需于郊,利用恆,无咎。','需于沙,小有言,終吉。','需于泥,致寇至。','需于血,出自穴。','需于酒食,貞吉。','入于穴,有不速之客三人來,敬之終吉。']},
'訟':{g:'有孚,窒惕,中吉。終凶。利見大人,不利涉大川。',y:['不永所事,小有言,終吉。','不克訟,歸而逋,其邑人三百戶无眚。','食舊德,貞厲,終吉。或從王事,无成。','不克訟,復即命,渝安貞,吉。','訟,元吉。','或錫之鞶帶,終朝三褫之。']},
'師':{g:'貞,丈人吉,无咎。',y:['師出以律,否臧凶。','在師,中吉,无咎,王三錫命。','師或輿尸,凶。','師左次,无咎。','田有禽,利執言,无咎。長子帥師,弟子輿尸,貞凶。','大君有命,開國承家,小人勿用。']},
'比':{g:'吉。原筮,元永貞,无咎。不寧方來,後夫凶。',y:['有孚比之,无咎。有孚盈缶,終來有它吉。','比之自內,貞吉。','比之匪人。','外比之,貞吉。','顯比,王用三驅,失前禽。邑人不誡,吉。','比之无首,凶。']},
'小畜':{g:'亨。密雲不雨,自我西郊。',y:['復自道,何其咎?吉。','牽復,吉。','輿說輻,夫妻反目。','有孚,血去惕出,无咎。','有孚攣如,富以其鄰。','既雨既處,尚德載。婦貞厲。月幾望,君子征凶。']},
'履':{g:'履虎尾,不咥人,亨。',y:['素履往,无咎。','履道坦坦,幽人貞吉。','眇能視,跛能履。履虎尾,咥人,凶。武人為于大君。','履虎尾,愬愬,終吉。','夬履,貞厲。','視履考祥,其旋元吉。']},
'泰':{g:'小往大來,吉亨。',y:['拔茅茹,以其彙,征吉。','包荒,用馮河,不遐遺。朋亡,得尚于中行。','无平不陂,无往不復,艱貞无咎。勿恤其孚,于食有福。','翩翩,不富以其鄰,不戒以孚。','帝乙歸妹,以祉元吉。','城復于隍,勿用師。自邑告命,貞吝。']},
'否':{g:'否之匪人,不利君子貞,大往小來。',y:['拔茅茹,以其彙,貞吉,亨。','包承,小人吉,大人否,亨。','包羞。','有命无咎,疇離祉。','休否,大人吉。其亡其亡,繫于苞桑。','傾否,先否後喜。']},
'同人':{g:'同人于野,亨。利涉大川,利君子貞。',y:['同人于門,无咎。','同人于宗,吝。','伏戎于莽,升其高陵,三歲不興。','乘其墉,弗克攻,吉。','同人,先號咷而後笑。大師克相遇。','同人于郊,无悔。']},
'大有':{g:'元亨。',y:['无交害,匪咎,艱則无咎。','大車以載,有攸往,无咎。','公用亨于天子,小人弗克。','匪其彭,无咎。','厥孚交如,威如,吉。','自天祐之,吉无不利。']},
'謙':{g:'亨,君子有終。',y:['謙謙君子,用涉大川,吉。','鳴謙,貞吉。','勞謙君子,有終,吉。','无不利,撝謙。','不富以其鄰,利用侵伐,无不利。','鳴謙,利用行師,征邑國。']},
'豫':{g:'利建侯行師。',y:['鳴豫,凶。','介于石,不終日,貞吉。','盱豫,悔。遲有悔。','由豫,大有得。勿疑,朋盍簪。','貞疾,恆不死。','冥豫,成有渝,无咎。']},
'隨':{g:'元亨利貞,无咎。',y:['官有渝,貞吉。出門交有功。','係小子,失丈夫。','係丈夫,失小子。隨有求,得,利居貞。','隨有獲,貞凶。有孚,在道以明,何咎?','孚于嘉,吉。','拘係之,乃從維之。王用亨于西山。']},
'蠱':{g:'元亨,利涉大川。先甲三日,後甲三日。',y:['幹父之蠱,有子,考无咎,厲終吉。','幹母之蠱,不可貞。','幹父之蠱,小有悔,无大咎。','裕父之蠱,往見吝。','幹父之蠱,用譽。','不事王侯,高尚其事。']},
'臨':{g:'元,亨,利,貞。至于八月有凶。',y:['咸臨,貞吉。','咸臨,吉,无不利。','甘臨,无攸利。既憂之,无咎。','至臨,无咎。','知臨,大君之宜,吉。','敦臨,吉,无咎。']},
'觀':{g:'盥而不薦,有孚顒若。',y:['童觀,小人无咎,君子吝。','闚觀,利女貞。','觀我生,進退。','觀國之光,利用賓于王。','觀我生,君子无咎。','觀其生,君子无咎。']},
'噬嗑':{g:'亨。利用獄。',y:['屨校滅趾,无咎。','噬膚滅鼻,无咎。','噬腊肉,遇毒。小吝,无咎。','噬乾胏,得金矢。利艱貞,吉。','噬乾肉,得黃金。貞厲,无咎。','何校滅耳,凶。']},
'賁':{g:'亨。小利有攸往。',y:['賁其趾,舍車而徒。','賁其須。','賁如,濡如,永貞吉。','賁如,皤如,白馬翰如,匪寇婚媾。','賁于丘園,束帛戔戔。吝,終吉。','白賁,无咎。']},
'剝':{g:'不利有攸往。',y:['剝床以足,蔑貞,凶。','剝床以辨,蔑貞,凶。','剝之,无咎。','剝床以膚,凶。','貫魚,以宮人寵,无不利。','碩果不食,君子得輿,小人剝廬。']},
'復':{g:'亨。出入无疾,朋來无咎。反復其道,七日來復,利有攸往。',y:['不遠復,无祗悔,元吉。','休復,吉。','頻復,厲,无咎。','中行獨復。','敦復,无悔。','迷復,凶,有災眚。用行師,終有大敗,以其國君凶,至于十年,不克征。']},
'无妄':{g:'元亨利貞。其匪正有眚,不利有攸往。',y:['无妄,往吉。','不耕穫,不菑畬,則利有攸往。','无妄之災。或繫之牛,行人之得,邑人之災。','可貞,无咎。','无妄之疾,勿藥有喜。','无妄,行有眚,无攸利。']},

'大過':{g:'棟橈,利有攸往,亨。',y:['藉用白茅,无咎。','枯楊生稊,老夫得其女妻,无不利。','棟橈,凶。','棟隆,吉。有它吝。','枯楊生華,老婦得其士夫,无咎无譽。','過涉滅頂,凶,无咎。']},
'坎':{g:'習坎,有孚。維心亨。行有尚。',y:['習坎,入于坎窞,凶。','坎有險,求小得。','來之坎坎,險且枕,入于坎窞,勿用。','樽酒簋貳,用缶,納約自牖,終无咎。','坎不盈,祗既平,无咎。','係用徽纆,寘于叢棘,三歲不得,凶。']},

'明夷':{g:'利艱貞。',y:['明夷于飛,垂其翼。君子于行,三日不食。有攸往,主人有言。','明夷,夷于左股,用拯馬壯,吉。','明夷于南狩,得其大首,不可疾,貞。','入于左腹,獲明夷之心,于出門庭。','箕子之明夷,利貞。','不明,晦。初登于天,後入于地。']},

let HEX_N={},HEX_N2={},HEX_YG={};
fetch('%E7%BE%85%E7%9B%A4%E4%BA%92%E5%8B%95%E5%8E%9F%E5%9E%8B.html').then(r=>r.text()).then(t=>{
  try{const a=t.match(/const HEX_N=\{[\s\S]*?\};/);if(a)HEX_N=eval('('+a[0].slice(12,-1)+')');}catch(e){}
  try{const b=t.match(/const HEX_N2=\{[\s\S]*?\};/);if(b)HEX_N2=eval('('+b[0].slice(13,-1)+')');}catch(e){}
}).catch(()=>{});
// ── 起卦流程 ──
let casts=[],mode='auto';
const CN={6:'老陰(三字)',7:'少陽(一背)',8:'少陰(兩背)',9:'老陽(三背)'};
document.getElementById('mAuto').onclick=()=>{mode='auto';swapMode()};
document.getElementById('mHand').onclick=()=>{mode='hand';swapMode()};
function swapMode(){
  document.getElementById('mAuto').classList.toggle('on',mode==='auto');
  document.getElementById('mHand').classList.toggle('on',mode==='hand');
  document.getElementById('autoBox').style.display=mode==='auto'?'block':'none';
  document.getElementById('handBox').style.display=mode==='hand'?'block':'none';
}
// 手動六爻選單
(function(){const hs=document.getElementById('handSel');
  for(let i=0;i<6;i++){const s=document.createElement('div');s.style.cssText='display:flex;align-items:center;gap:8px;margin:4px 0';
    s.innerHTML='<span style="min-width:44px;font-size:13px">第'+(i+1)+'爻</span>'
      +'<select data-i="'+i+'"><option value="7">一背二字(少陽)</option><option value="8">二背一字(少陰)</option><option value="9">三背(老陽,動)</option><option value="6">三字(老陰,動)</option></select>';
    hs.appendChild(s);}})();
document.getElementById('throwBtn').onclick=()=>{
  if(casts.length>=6)return;
  // 三枚銅錢:背=3、字=2
  const coins=[0,1,2].map(()=>Math.random()<0.5?3:2);
  const v=coins[0]+coins[1]+coins[2];
  casts.push(v);
  document.getElementById('coins').innerHTML=coins.map(c=>'<span class="coin">'+(c===3?'背':'字')+'</span>').join('')
    +'<div style="font-size:13px;margin-top:4px;opacity:.75">'+CN[v]+'</div>';
  renderLines();
  if(casts.length===6){document.getElementById('throwBtn').style.display='none';finish();}
  else document.getElementById('throwBtn').textContent='擲 第 '+(casts.length+1)+' 爻(共六爻)';
  window.fscP&&window.fscP('coin','throw',casts.length);
};
document.getElementById('handGo').onclick=()=>{
  casts=[...document.querySelectorAll('#handSel select')].map(s=>+s.value);
  renderLines();finish();
  window.fscP&&window.fscP('coin','hand','起卦');
};
document.getElementById('resetBtn').onclick=()=>{location.reload();};
function renderLines(){
  const el=document.getElementById('lines');
  el.innerHTML=[...casts].map((v,i)=>({v,i})).reverse().map(({v,i})=>{
    const yang=(v===7||v===9),mov=(v===6||v===9);
    return '<div class="yline"><span style="min-width:40px;opacity:.6">'+yaoTitle(i,yang?1:0)+'</span>'
      +'<span class="bar'+(mov?' mov':'')+'">'+(yang?'<div></div>':'<div></div><div style="background:transparent"></div><div></div>')+'</span>'
      +'<span style="opacity:.6">'+CN[v]+(mov?' ●動':'')+'</span></div>';
  }).join('');
}
function finish(){
  document.getElementById('resetBtn').style.display='inline-block';
  const lines=casts.map(v=>(v===7||v===9)?1:0);
  const movers=casts.map((v,i)=>(v===6||v===9)?i:-1).filter(i=>i>=0);
  const ben=hexName(lines);
  const lines2=lines.map((b,i)=>movers.includes(i)?1-b:b);
  const bian=hexName(lines2);
  const nMov=movers.length;
  // 變占法(朱熹《易學啟蒙》)
  let rule='',focus=[];
  if(nMov===0){rule='六爻皆靜:以【本卦卦辭】斷之。';focus=['bgc'];}
  else if(nMov===1){rule='一爻動:以【本卦動爻爻辭】為斷。';focus=['y'+movers[0]];}
  else if(nMov===2){rule='二爻動:以【上動爻爻辭】為主、下動爻為輔。';focus=['y'+movers[1],'y'+movers[0]];}
  else if(nMov===3){rule='三爻動:參【本卦與變卦卦辭】,以本卦為主。';focus=['bgc','vgc'];}
  else if(nMov===4){rule='四爻動:以【變卦二不變爻】之下爻為主。';focus=['vgc'];}
  else if(nMov===5){rule='五爻動:以【變卦不變之爻】爻辭斷之。';focus=['vgc'];}
  else{rule=(ben.n==='乾'||ben.n==='坤')?'六爻皆動:以【用'+(ben.n==='乾'?'九':'六')+'】斷之。':'六爻皆動:以【變卦卦辭】斷之。';
    focus=(ben.n==='乾'||ben.n==='坤')?['y6']:['vgc'];}
  const zb=ZY[ben.n],zv=ZY[bian.n],zd=ZD[ben.n];
  const key=Object.keys(PAIR2N).find(k=>PAIR2N[k]===ben.n);
  const sym={'吉':'◎','平':'○','慎':'△'};
  let h='<b style="font-family:\'Noto Serif TC\',serif;font-size:20px;color:var(--gold)">'+FULLN[ben.n]+'</b>'
    +(nMov?'<span style="opacity:.6;font-size:14px"> 之 </span><b style="font-family:\'Noto Serif TC\',serif;font-size:16px">'+FULLN[bian.n]+'</b>':'')
    +'<div style="margin:4px 0"><span class="tag">動爻 '+nMov+'</span><span class="tag" style="background:rgba(201,169,106,.3)">'+rule+'</span></div>'
    // 四類提示
    +'<div style="display:flex;gap:12px;margin:8px 0;font-size:14px">'
    +['財運','感情','事業','健康'].map((t,i)=>'<span>'+t+' <b style="color:'+(zd[i]==='吉'?'var(--green)':zd[i]==='慎'?'var(--red)':'var(--gold)')+'">'+sym[zd[i]]+zd[i]+'</b></span>').join('')+'</div>'
    +'<div style="font-size:14.5px;line-height:1.8"><b style="color:var(--gold)">總斷:</b>'+zd[4]+'</div>'
    // 本卦卦辭
    +'<div class="sec'+(focus.includes('bgc')?'':'')+'"><b>本卦・'+FULLN[ben.n]+' 卦辭</b>'
    +'<div class="yw'+(focus.includes('bgc')?' hl':'')+'">'+ben.n+':'+zb.g+'</div></div>';
  // 動爻爻辭
  if(nMov>0&&nMov<=3){
    h+='<div class="sec"><b>動爻爻辭(《周易》原文)</b>';
    for(const i of movers){
      const isFo=focus.includes('y'+i);
      h+='<div class="yw'+(isFo?' hl':'')+'" style="margin:4px 0">'+yaoTitle(i,lines[i])+':'+zb.y[i]+(isFo?' <span class="tag" style="background:var(--gold);color:#fff">主斷</span>':'')+'</div>';
    }
    h+='</div>';
  }
  if(nMov===6&&zb.y[6]){h+='<div class="sec"><b>用辭</b><div class="yw hl">用'+(ben.n==='乾'?'九':'六')+':'+zb.y[6]+'</div></div>';}
  // 變卦
  if(nMov>0){h+='<div class="sec"><b>變卦・'+FULLN[bian.n]+' 卦辭</b><div class="yw'+(focus.includes('vgc')?' hl':'')+'">'+bian.n+':'+zv.g+'</div>'
    +'<div style="font-size:12.5px;opacity:.7">變卦示事情之走向與結果。</div></div>';}
  // 天紀層
  if(key&&HEX_N[key])h+='<div class="sec"><b style="color:var(--pur)">【天紀(倪海廈)一派參考】</b><div style="font-size:13.5px;line-height:1.8">'+HEX_N[key]+'</div></div>';
  if(key&&HEX_N2[key])h+='<div class="sec"><b style="color:var(--pur)">【人間道深解】</b><div style="font-size:13.5px;line-height:1.8">'+HEX_N2[key]+'</div></div>';
  h+='<div class="note">變占法依朱熹《易學啟蒙》;卦爻辭為通行本原文。欲詳斷流年應期、用神喜忌,請洽抱朴隨緣堂。</div>';
  const r=document.getElementById('result');r.style.display='block';r.innerHTML=h;
  r.scrollIntoView({behavior:'smooth'});
  window.fscP&&window.fscP('coin','result',ben.n+(nMov?'之'+bian.n:''));
}
</script></body></html>
