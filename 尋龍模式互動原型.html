<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>地理尋龍 — 互動原型</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--paper:#FAF7F2;--card:#F1ECE2;--gold:#8C6D3F;--ink:#2B2620;--red:#A63A2E;--green:#4A6B4F;--blue:#3E5C76}
*{box-sizing:border-box;margin:0}
body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;display:flex;flex-direction:column;align-items:center;padding:12px}
h1{font-family:"Noto Serif TC",serif;font-size:19px;color:var(--gold)}
.sub{font-size:12px;opacity:.6;margin:2px 0 8px}
#map{width:min(880px,96vw);height:48vh;border-radius:16px}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.chip{border:1px solid var(--gold);border-radius:999px;padding:6px 14px;font-size:14px;cursor:pointer;background:transparent}
.chip.on{background:var(--gold);color:#fff}
#panel{width:min(880px,96vw);background:var(--card);border-radius:16px;padding:12px 16px}
#profile{width:100%;height:170px;background:#fff;border-radius:12px}
.tag{display:inline-block;border-radius:99px;padding:2px 10px;font-size:12.5px;margin:2px;background:#fff;border:1px solid #ddd}
.tag.good{background:rgba(74,107,79,.12);color:var(--green);border-color:var(--green)}
.tag.warn{background:rgba(166,58,46,.12);color:var(--red);border-color:var(--red)}
.score{font-family:"Noto Serif TC",serif;font-size:34px;font-weight:700;color:var(--gold)}
.note{font-size:11.5px;opacity:.55;margin-top:4px;line-height:1.5}
</style><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet"><style>
*{-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;padding:22px 14px 44px}
h1{font-family:'Noto Serif TC',serif !important;font-size:21px;letter-spacing:.06em;font-weight:900}
.sub{letter-spacing:.03em;margin:4px 0 16px !important}
.chip{transition:all .15s;font-weight:500}
.chip.on{box-shadow:0 2px 10px rgba(140,109,63,.35)}
.box,#bar,#panel,#info,#results .hit{box-shadow:0 2px 16px rgba(43,38,32,.07);border:1px solid rgba(140,109,63,.15)}
input,select{background:#fff !important}
button{font-family:inherit}
</style></head><body>
<h1>地理尋龍</h1>
<div class="sub">龍脈剖面|過峽偵測|穴場方位</div>
<div class="row">
  <button class="chip on" data-t="dragon">畫龍脈線</button>
  <button class="chip" data-t="xue">點穴</button>
  <button class="chip" data-t="clear">清除</button>
  <span style="font-size:13px;align-self:center" id="status">沿山脊逐點點擊,雙擊結束取剖面</span>
</div>
<div id="map"></div>
<div id="panel">
  <canvas id="profile"></canvas>
  <div id="result" style="margin-top:8px">尚無剖面。</div>
  <div class="note">地形圖:OpenTopoMap(等高線)。高程:open-elevation 公開 API(需網路;正式版以離線 DEM 資料包)。點穴後自動顯示穴場坐向與朝案方位(24山)。</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const M24='壬子癸丑艮寅甲卯乙辰巽巳丙午丁未坤申庚酉辛戌乾亥';
const map=L.map('map').setView([24.18,120.85],13); // 台灣中部山區
L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:16,attribution:'© OpenTopoMap © OSM'}).addTo(map);
map.doubleClickZoom.disable();
const R=d=>d*Math.PI/180,D=r=>r*180/Math.PI;
function bearing(a,b){const f1=R(a.lat),f2=R(b.lat),dl=R(b.lng-a.lng);
  const y=Math.sin(dl)*Math.cos(f2),x=Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl);
  return (D(Math.atan2(y,x))+360)%360}
const mountain=d=>M24[Math.floor(((d-337.5)%360+360)%360/15)];
// 剖面分析(與 Dart DragonTerrainAnalyzer 同式)
function detect(elev,prom=8){
  const n=elev.length,sm=elev.map((e,i)=>i===0||i===n-1?e:(elev[i-1]+elev[i]+elev[i+1])/3),out=[];
  for(let i=1;i<n-1;i++){
    const mx=sm[i]>sm[i-1]&&sm[i]>=sm[i+1],mn=sm[i]<sm[i-1]&&sm[i]<=sm[i+1];
    if(!mx&&!mn)continue;
    let extL=sm[i],extR=sm[i];
    for(let l=i-1;l>=0&&(mx?sm[l]<sm[i]:sm[l]>sm[i]);l--)extL=mx?Math.min(extL,sm[l]):Math.max(extL,sm[l]);
    for(let r=i+1;r<n&&(mx?sm[r]<sm[i]:sm[r]>sm[i]);r++)extR=mx?Math.min(extR,sm[r]):Math.max(extR,sm[r]);
    const p=mx?sm[i]-Math.max(extL,extR):Math.min(extL,extR)-sm[i];
    if(p>=prom)out.push({i,feature:mx?'峰':'過峽',elev:elev[i]})}
  return out}
function quality(elev){
  const f=detect(elev),peaks=f.filter(x=>x.feature==='峰').length,passes=f.filter(x=>x.feature==='過峽').length;
  let score=Math.min(60,Math.min(peaks,passes)*15);const notes=['起伏節數:'+peaks+' 峰 '+passes+' 峽'];
  const drop=Math.max(...elev)-Math.min(...elev);
  if(drop>=50&&drop<=500){score+=20;notes.push('總落差 '+drop.toFixed(0)+'m,適中')}
  else notes.push('總落差 '+drop.toFixed(0)+'m,'+(drop<50?'過平(氣弱)':'過險(氣急)'));
  const tail=Math.floor(elev.length/5);
  if(elev[elev.length-1]<elev[elev.length-1-tail]){score+=20;notes.push('末段緩降,有結穴之勢')}
  else notes.push('末段未見緩降');
  return{score:Math.max(0,Math.min(100,score)),notes,feats:f}}
let tool='dragon',pts=[],layer=L.layerGroup().addTo(map),xue=null,lastElev=null,lastLine=null;
document.querySelectorAll('.chip[data-t]').forEach(b=>b.onclick=()=>{
  if(b.dataset.t==='clear'){pts=[];layer.clearLayers();xue=null;lastElev=null;
    document.getElementById('result').textContent='已清除。';draw([],[]);return}
  tool=b.dataset.t;document.querySelectorAll('.chip[data-t]').forEach(x=>x.classList.remove('on'));b.classList.add('on')});
map.on('click',e=>{
  if(tool==='dragon'){pts.push(e.latlng);
    L.circleMarker(e.latlng,{radius:4,color:'#8C6D3F'}).addTo(layer);
    if(pts.length>1)L.polyline(pts.slice(-2),{color:'#8C6D3F',weight:3}).addTo(layer)}
  else if(tool==='xue'){xue=e.latlng;
    L.marker(e.latlng,{title:'穴'}).addTo(layer);
    if(pts.length>=2){
      const lai=bearing(xue,pts[0]); // 來龍方(往首點)
      const sit=lai, fac=(sit+180)%360;
      document.getElementById('status').innerHTML=
        '穴場:坐'+mountain(sit)+'向'+mountain(fac)+'(來龍 '+lai.toFixed(1)+'°)';
      L.polyline([xue,pts[0]],{color:'#3E5C76',weight:2,dashArray:'5 5'}).addTo(layer)}
  }});
map.on('dblclick',async e=>{
  if(tool!=='dragon'||pts.length<2)return;
  document.getElementById('result').textContent='取樣高程中…';
  // 沿線等距取 60 點
  const samples=[];const seg=[];let total=0;
  for(let i=1;i<pts.length;i++){const d=map.distance(pts[i-1],pts[i]);seg.push(d);total+=d}
  for(let k=0;k<60;k++){let t=total*k/59,i=0;
    while(i<seg.length&&t>seg[i]){t-=seg[i];i++}
    if(i>=seg.length){samples.push(pts[pts.length-1]);continue}
    const f=t/seg[i];
    samples.push(L.latLng(pts[i].lat+(pts[i+1].lat-pts[i].lat)*f,pts[i].lng+(pts[i+1].lng-pts[i].lng)*f))}
  try{
    const q=samples.map(p=>({latitude:p.lat,longitude:p.lng}));
    const resp=await fetch('https://api.open-elevation.com/api/v1/lookup',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({locations:q})});
    const data=await resp.json();
    lastElev=data.results.map(r=>r.elevation);
    const Q=quality(lastElev);
    draw(lastElev,Q.feats);
    document.getElementById('result').innerHTML=
      '<span class="score">'+Q.score+'</span><span style="opacity:.6"> /100 龍脈品質</span> '
      +Q.notes.map(n=>'<span class="tag '+(n.includes('適中')||n.includes('結穴')?'good':(n.includes('過平')||n.includes('過險')||n.includes('未見')?'warn':''))+'">'+n+'</span>').join('')
      +'<div class="note">評分規則:起伏節數(每對峰峽+15,上限60)+落差適中(50–500m,+20)+末段緩降(+20)。巒頭通則之量化輔助,非取代目力。</div>';
  }catch(err){
    document.getElementById('result').innerHTML='<span class="tag warn">高程 API 無法連線(需網路)。</span> 以示範資料展示:';
    lastElev=[...Array(60)].map((_,i)=>300-i*2.5+40*((i%20<10)?(i%10)/10:(10-i%10)/10));
    const Q=quality(lastElev);draw(lastElev,Q.feats);
    document.getElementById('result').innerHTML+='<span class="score">'+Q.score+'</span>/100 '+Q.notes.map(n=>'<span class="tag">'+n+'</span>').join('');
  }
});
function draw(elev,feats){
  const cv=document.getElementById('profile'),ctx=cv.getContext('2d');
  cv.width=cv.clientWidth*devicePixelRatio;cv.height=170*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);
  const W=cv.clientWidth,H=170;ctx.clearRect(0,0,W,H);
  if(!elev.length){ctx.fillStyle='#999';ctx.font='13px sans-serif';ctx.fillText('剖面圖(畫龍脈線後顯示)',12,24);return}
  const mn=Math.min(...elev),mx=Math.max(...elev),pad=24;
  const X=i=>pad+(W-2*pad)*i/(elev.length-1),Y=e=>H-pad-(H-2*pad)*(e-mn)/((mx-mn)||1);
  ctx.beginPath();ctx.moveTo(X(0),Y(elev[0]));
  elev.forEach((e,i)=>ctx.lineTo(X(i),Y(e)));
  ctx.strokeStyle='#8C6D3F';ctx.lineWidth=2;ctx.stroke();
  ctx.lineTo(X(elev.length-1),H-pad);ctx.lineTo(X(0),H-pad);ctx.closePath();
  ctx.fillStyle='rgba(140,109,63,.12)';ctx.fill();
  for(const f of feats){
    ctx.fillStyle=f.feature==='峰'?'#4A6B4F':'#A63A2E';
    ctx.beginPath();ctx.arc(X(f.i),Y(f.elev),4,0,7);ctx.fill();
    ctx.font='11px "Noto Sans TC"';ctx.fillText(f.feature,X(f.i)-10,Y(f.elev)-8)}
  ctx.fillStyle='#666';ctx.font='10px sans-serif';
  ctx.fillText(mx.toFixed(0)+'m',4,Y(mx)+4);ctx.fillText(mn.toFixed(0)+'m',4,Y(mn)+4);
}
draw([],[]);
</script></body></html>
