<style>
:root{--bg:#0D0B09;--face:#141110;--card:#1C1915;--gold:#C9A96A;--gold2:#8C6D3F;--ink:#EDE7DA;--dim:#8f887b;--red:#E07A6A;--green:#8FC49A}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',-apple-system,'PingFang TC',sans-serif;display:flex;flex-direction:column;align-items:center;padding:14px 12px 60px}
.steps{width:min(560px,96vw);background:var(--card);border:1px solid rgba(201,169,106,.25);border-radius:14px;padding:11px 14px;font-size:14.5px;line-height:1.8;margin-bottom:10px}
.steps b{color:var(--gold)}
.modes{display:flex;gap:8px;margin-bottom:10px}
.mchip{border:1.5px solid var(--gold2);border-radius:999px;padding:7px 18px;font-size:14.5px;cursor:pointer;background:transparent;color:var(--dim);font-family:inherit}
.mchip.on{background:var(--gold);color:#141110;font-weight:700}
#wrap{position:relative;touch-action:none}
canvas{display:block;cursor:grab}
#big{font-family:'Noto Serif TC',serif;font-weight:900;font-size:56px;margin-top:6px;color:#fff;line-height:1.1;text-align:center}
#title{font-family:'Noto Serif TC',serif;font-weight:900;font-size:40px;color:var(--gold);text-align:center;letter-spacing:.12em;margin-top:2px}
#tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0 4px;max-width:560px}
.tag{border-radius:999px;padding:5px 14px;font-size:15px;background:var(--card);border:1px solid rgba(201,169,106,.3)}
.tag.warn{color:var(--red);border-color:rgba(224,122,106,.5)}
.tag.good{color:var(--green);border-color:rgba(143,196,154,.4)}
#ctrl{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;margin:14px 0;width:min(560px,96vw)}
input[type=number]{width:120px;padding:10px;border:1.5px solid var(--gold2);border-radius:12px;background:var(--card);color:#fff;font-size:22px;text-align:center;font-family:'Noto Serif TC',serif;font-weight:700}
input[type=range]{width:min(430px,90vw);accent-color:var(--gold)}
.seg{display:flex;border:1.5px solid var(--gold2);border-radius:999px;overflow:hidden}
.seg button{border:0;background:transparent;color:var(--dim);padding:9px 16px;font-size:14.5px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--gold);color:#141110;font-weight:700}
select{padding:9px 12px;border:1.5px solid var(--gold2);border-radius:12px;background:var(--card);color:var(--ink);font-size:15px}
.panel{width:min(560px,96vw);background:var(--card);border:1px solid rgba(201,169,106,.22);border-radius:16px;padding:15px 16px;margin-top:12px}
.panel h2{font-family:'Noto Serif TC',serif;font-size:17px;color:var(--gold);letter-spacing:.1em;margin-bottom:10px}
.grid9{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cell{background:#221E19;border-radius:12px;padding:8px 4px;text-align:center;border:1.5px solid transparent}
.cell.sit{border-color:#7FA0C0}.cell.fac{border-color:var(--red)}
.cell .pn{font-size:11.5px;color:var(--dim)}
.cell .st{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:900;letter-spacing:8px;text-indent:8px}
.cell .st .w{color:var(--gold)}
.cell .bz{font-size:12px;border-radius:99px;display:inline-block;padding:1px 9px;margin-top:3px}
.bz.j{background:rgba(143,196,154,.15);color:var(--green)}
.bz.x{background:rgba(224,122,106,.13);color:var(--red)}
.row2{display:flex;justify-content:space-between;padding:8px 2px;border-bottom:1px dashed rgba(201,169,106,.18);font-size:15.5px}
.row2:last-child{border:0}
.row2 b{font-family:'Noto Serif TC',serif}
.note{font-size:12.5px;color:var(--dim);margin-top:8px;line-height:1.7}
.dirs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.dir{background:#221E19;border-radius:12px;text-align:center;padding:9px 2px}
.dir b{font-family:'Noto Serif TC',serif;font-size:18px;display:block}
.dir span{font-size:12.5px}
#card{position:fixed;left:50%;bottom:-110%;transform:translateX(-50%);width:min(560px,96vw);background:#221E19;border:1px solid rgba(201,169,106,.35);border-bottom:0;border-radius:22px 22px 0 0;padding:20px 22px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -6px 30px rgba(0,0,0,.5);transition:bottom .28s;z-index:9;max-height:72vh;overflow:auto}

.hinttap{font-size:12.5px;color:var(--dim);text-align:center;margin-top:6px}

    return [...Array(9)].some((_,i)=>ok(i+1))});
  const ADJ={'坎':['乾','艮'],'艮':['坎','震'],'震':['艮','巽'],'巽':['震','離'],'離':['巽','坤'],'坤':['離','兌'],'兌':['坤','乾'],'乾':['兌','坎']};
  const GEN={1:6,6:1,2:7,7:2,3:8,8:3,4:9,9:4};
  const gates=ADJ[fp].map(gp=>{const s=base[gp];let usable=false;
    if(s!==5){usable=!YANG.has(PAL_M[NUM2PAL[s]][kind])}
    return{palace:gp,kind:GEN[PAL2NUM[fp]]===PAL2NUM[gp]?'正城門':'副城門',usable}});
  const yd={'中':5,'乾':6,'兌':7,'艮':8,'離':9,'坎':1,'坤':2,'震':3,'巽':4};
  const warnings=[];
  for(const[nm,cc]of[['山星',mt],['向星',fc]]){
    if(FLY.every(q=>cc[q]===yd[q]))warnings.push(nm+'全盤伏吟');
    if(FLY.every(q=>q==='中'?cc[q]===5:cc[q]+yd[q]===10))warnings.push(nm+'全盤反吟');
  }
  return{period,sitting,facing,ti,base,mountain:mt,facing_stars:fc,pattern,
         sanban:fm?'父母三般卦':lz?'連珠三般卦':null,gates,warnings};
}
// 八宅
const TRIB={'乾':7,'兌':6,'離':5,'震':4,'巽':3,'坎':2,'艮':1,'坤':0};
const XSTAR=['伏位','生氣','絕命','五鬼','禍害','六煞','天醫','延年'];
const youxing=(zhai,gong)=>XSTAR[TRIB[zhai]^TRIB[gong]];
const PAL2GUA={'坎':'坎','坤':'坤','震':'震','巽':'巽','乾':'乾','兌':'兌','艮':'艮','離':'離'};


const M24S='壬子癸丑艮寅甲卯乙辰巽巳丙午丁未坤申庚酉辛戌乾亥';
const DIRZH={'坎':'北','艮':'東北','震':'東','巽':'東南','離':'南','坤':'西南','兌':'西','乾':'西北'};
const PATT_TXT={'旺山旺向':'丁財兩旺之局,坐向皆得當運旺星,格局上乘。','上山下水':'旺星顛倒,丁財兩損,須巒頭配合補救,選宅宜慎。','雙星會向':'旺氣聚於向首,利財;宜門前開陽、後方有靠。','雙星會坐':'旺氣聚於坐山,利丁;宜坐後見水放光或明堂開闊。','其他':'非四大格局,吉凶須逐宮細論。'};
const QZH={wang:'旺',xiang:'相',gu:'孤',xu:'虛',kongWang:'龜甲空亡'};
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),card=document.getElementById('card');
let W=Math.min(430,window.innerWidth-28);cv.width=W*devicePixelRatio;cv.height=W*devicePixelRatio;
cv.style.width=cv.style.height=W+'px';ctx.scale(devicePixelRatio,devicePixelRatio);
let heading=138,isFacing=true,period=9,mode='simple';
const cellAt=(cells,anchor,span,d)=>cells[Math.floor((((d-anchor)%360)+360)%360/span)];
// 佈局:兩種模式的半徑帶
function layout(){
  if(mode==='simple')return{bagua:.47,m24:[.56,.775],rings:[],tick:[.86,.945],deg:.79,m24font:.085};
  return{bagua:.30,m24:[.36,.53],rings:[
    {key:'fenjin',cells:DATA.fenjin,anchor:337.5,span:3,r:[.53,.645],q:1},
    {key:'d72',cells:DATA.d72,anchor:345,span:5,r:[.645,.755]},
    {key:'d60',cells:DATA.d60,anchor:345,span:6,r:[.755,.862]}],
    tick:[.885,.95],deg:.80,m24font:.062};
}
function radialText(txt,midDeg,rRatio,R,font,color,vertical){
  const scr=(midDeg-heading+360)%360;const flip=scr>90&&scr<270;
  ctx.save();ctx.rotate((midDeg+(flip?180:0))*Math.PI/180);
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=font;
  const y=(flip?1:-1)*R*rRatio;
  if(vertical&&txt.length>1){const fs=parseFloat(font);const lh=fs*1.02;const off=-(txt.length-1)*lh/2;
    [...txt].forEach((ch,i)=>ctx.fillText(ch,0,y+(off+i*lh)*(flip?-1:1)));}
  else ctx.fillText(txt,0,y);
  ctx.restore();
}
function draw(){
  const R=W/2,L=layout();ctx.clearRect(0,0,W,W);ctx.save();ctx.translate(R,R);
  ctx.beginPath();ctx.arc(0,0,R-2,0,7);ctx.fillStyle='#141110';ctx.fill();
  ctx.strokeStyle='rgba(201,169,106,.8)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();ctx.rotate(-heading*Math.PI/180);
  for(let d=0;d<360;d++){const a=(d-90)*Math.PI/180,long=d%15===0,mid=d%5===0;
    const r1=R*(long?L.tick[0]:mid?L.tick[0]+.03:L.tick[0]+.05),r2=R*L.tick[1];
    ctx.strokeStyle=long?'#C9A96A':mid?'rgba(237,231,218,.75)':'rgba(237,231,218,.28)';
    ctx.lineWidth=long?2:1;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);ctx.stroke();}
  for(let d=0;d<360;d+=30){ctx.save();ctx.rotate(d*Math.PI/180);
    ctx.fillStyle='rgba(237,231,218,.9)';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=R*0.045+'px "Noto Sans TC"';ctx.fillText(d,0,-R*L.deg);ctx.restore();}
  // 專業圈層
  for(const ring of L.rings){
    const[ri,ro]=[ring.r[0]*R,ring.r[1]*R];
    ctx.strokeStyle='rgba(201,169,106,.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,ri,0,7);ctx.stroke();ctx.beginPath();ctx.arc(0,0,ro,0,7);ctx.stroke();
    for(const c of ring.cells){
      const a0=(c.start_deg-90)*Math.PI/180;
      ctx.strokeStyle='rgba(201,169,106,.25)';
      ctx.beginPath();ctx.moveTo(Math.cos(a0)*ri,Math.sin(a0)*ri);ctx.lineTo(Math.cos(a0)*ro,Math.sin(a0)*ro);ctx.stroke();
      if(ring.q&&c.quality){
        const col=c.usable?'rgba(143,196,154,.16)':(c.quality==='kongWang'?'rgba(224,122,106,.18)':'rgba(237,231,218,.05)');
        const sweep=((c.end_deg-c.start_deg+360)%360)*Math.PI/180;
        ctx.beginPath();ctx.arc(0,0,ro,a0,a0+sweep);ctx.arc(0,0,ri,a0+sweep,a0,true);ctx.closePath();
        ctx.fillStyle=col;ctx.fill();}
      if(c.name){const mid=(c.start_deg+((c.end_deg-c.start_deg+360)%360)/2)%360;
        radialText(c.name,mid,(ring.r[0]+ring.r[1])/2,R,R*0.026+'px "Noto Serif TC",serif','rgba(237,231,218,.85)',true);}
    }}
  // 24山
  for(let i=0;i<24;i++){
    const midDeg=(337.5+i*15+7.5)%360;
    radialText(M24S[i],midDeg,(L.m24[0]+L.m24[1])/2,R,'900 '+R*L.m24font+'px "Noto Serif TC",serif',
      ['子','午','卯','酉'].includes(M24S[i])?'#fff':'#C9A96A');
    const a=(337.5+i*15-90)*Math.PI/180;
    ctx.strokeStyle='rgba(201,169,106,.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*R*L.m24[0],Math.sin(a)*R*L.m24[0]);ctx.lineTo(Math.cos(a)*R*L.m24[1],Math.sin(a)*R*L.m24[1]);ctx.stroke();}
  ctx.strokeStyle='rgba(201,169,106,.5)';
  ctx.beginPath();ctx.arc(0,0,R*L.m24[0],0,7);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,R*L.m24[1],0,7);ctx.stroke();
  const BG=[['坎',0],['艮',45],['震',90],['巽',135],['離',180],['坤',225],['兌',270],['乾',315]];
  for(const[n,d]of BG)radialText(n,d,L.bagua,R,R*(mode==='simple'?0.058:0.05)+'px "Noto Serif TC",serif','rgba(237,231,218,.55)');
  ctx.restore();
  ctx.fillStyle='#E07A6A';
  ctx.beginPath();ctx.moveTo(0,-R+3);ctx.lineTo(-8,-R+22);ctx.lineTo(8,-R+22);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(237,231,218,.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-R*L.m24[0]);ctx.lineTo(0,R*L.m24[0]);ctx.moveTo(-R*L.m24[0],0);ctx.lineTo(R*L.m24[0],0);ctx.stroke();
  ctx.restore();
  update();
}
function interp(d){
  const i=Math.floor((((d-337.5)%360)+360)%360/15),m=M24S[i],opp=M24S[(i+12)%24];
  const center=(337.5+i*15+7.5)%360;let lean=d-center;if(lean>180)lean-=360;if(lean<-180)lean+=360;
  const toB=Math.min(((d-337.5)%15+15)%15,15-(((d-337.5)%15+15)%15));
  return{m,opp,lean,toB,fj:cellAt(DATA.fenjin,337.5,3,d),d72:cellAt(DATA.d72,345,5,d),d60:cellAt(DATA.d60,345,6,d),nb:M24S[(i+(lean>=0?1:23))%24]};
}
function update(){
  const r=interp(heading);
  const sit=isFacing?r.opp:r.m, fac=isFacing?r.m:r.opp;
  document.getElementById('big').textContent=heading.toFixed(1)+'°';
  document.getElementById('title').textContent=sit+'山'+fac+'向';
  const t=[];
  t.push([Math.abs(r.lean)<=3?'✓ 正向':'兼'+r.nb+' '+Math.abs(r.lean).toFixed(1)+'°'+(Math.abs(r.lean)>4.5?'(須替卦)':''),Math.abs(r.lean)<=3?'good':'']);
  t.push(['分金 '+r.fj.name+'('+QZH[r.fj.quality]+')',r.fj.usable?'good':'warn']);
  if(r.toB<1)t.push(['⚠ 騎縫線,微調避開','warn']);
  if(r.fj.quality==='kongWang')t.push(['⚠ 空亡線','warn']);
  document.getElementById('tags').innerHTML=t.map(([s,c])=>`<span class="tag ${c}">${s}</span>`).join('');
  document.getElementById('slider').value=heading.toFixed(1);
  document.getElementById('num').value=heading.toFixed(1);
  const c=xkChart(period,sit);
  const GRID=[['巽','離','坤'],['震','中','兌'],['艮','坎','乾']];
  const sp=palaceOf(sit),fp=palaceOf(fac),zhai=palaceOf(sit);
  const hi=n=>n===period?'<span class="w">'+n+'</span>':n;
  document.getElementById('g9').innerHTML=GRID.flat().map(p=>{
    const yx=p==='中'?'':youxing(zhai,p);const ji=yx&&'生氣天醫延年伏位'.includes(yx);
    return `<div class="cell ${p===sp?'sit':p===fp?'fac':''}"><div class="pn">${p}${p==='中'?'宮':'・'+(DIRZH[p]||'')}</div>
    <div class="st">${hi(c.mountain[p])}${hi(c.facing_stars[p])}</div>
    ${yx?`<div class="bz ${ji?'j':'x'}">${yx}</div>`:''}</div>`}).join('');
  document.getElementById('pattNote').innerHTML='<b style="color:var(--gold)">'+period+'運・'+c.pattern+'</b> — '+PATT_TXT[c.pattern]
    +(c.sanban?'另成'+c.sanban+',吉。':'')+(c.warnings.length?' ⚠ '+c.warnings.join('、')+'。':'');
  const order=['坎','艮','震','巽','離','坤','兌','乾'];
  document.getElementById('dirs').innerHTML=order.map(g=>{
    const yx=youxing(zhai,g);const ji='生氣天醫延年伏位'.includes(yx);
    return `<div class="dir" style="border:1px solid ${ji?'rgba(143,196,154,.35)':'rgba(224,122,106,.3)'}">
    <span style="color:var(--dim)">${DIRZH[g]}</span><b style="color:${ji?'var(--green)':'var(--red)'}">${yx}</b></div>`}).join('');
  document.getElementById('adv').innerHTML=
    `<div class="row2"><span>宅卦</span><b>${zhai}宅(${'坎離震巽'.includes(zhai)?'東四宅':'西四宅'})</b></div>
     <div class="row2"><span>穿山七十二龍</span><b>${r.d72.name?r.d72.name+'(納音'+r.d72.nayin+')':'空亡格 ⚠'}</b></div>
     <div class="row2"><span>透地六十龍</span><b>${r.d60.name}(納音${r.d60.nayin})</b></div>
     <div class="row2"><span>旺財方(向星${period})</span><b>${DIRZH[Object.keys(c.facing_stars).find(p=>p!=='中'&&c.facing_stars[p]===period)]||'—'}</b></div>
     <div class="row2"><span>旺丁方(山星${period})</span><b>${DIRZH[Object.keys(c.mountain).find(p=>p!=='中'&&c.mountain[p]===period)]||'—'}</b></div>
     <div class="row2"><span>城門</span><b>${c.gates.map(g=>g.palace+'宮'+(g.usable?'可用':'不可用')).join('・')}</b></div>`;
  const ys=(11-2026%9-1+9)%9+1;const ch=fly(ys);
  const wh=Object.keys(ch).find(p=>ch[p]===5);
  document.getElementById('yearNote').textContent='流年提醒(2026):五黃到'+(DIRZH[wh]||wh)+',忌動土修造;太歲在午(南)、歲破在子(北)。';
}
// 五段式詳解
const EX={
 m24:n=>['二十四山之「'+n+'」山,每山十五度,是立向的基本單位。','您的讀數相關方位落在'+n+'山附近。','山有陰陽五行與三元龍屬性,玄空挨星之順逆由此而定。','山本身無吉凶,吉凶取決於元運與飛星配合。','看下方飛星盤與八宅方位,確認吉凶佈局。'],
 bagua:n=>['後天八卦「'+n+'」宮,轄四十五度。','此宮位於'+DIRZH[n]+'方。','八宅與飛星皆以八宮為分析框架。','本宮吉凶見下方八宅方位卡。','將重要功能(門、房、桌)安於吉宮。'],
 fenjin:c=>['一百二十分金,每格三度:'+c.name+'(納音'+c.nayin+'),屬'+c.mountain+'山。','口訣:丙丁旺、庚辛相為珠寶可用;甲乙孤、壬癸虛為差錯;戊己為龜甲空亡。','本格屬「'+QZH[c.quality]+'」。',(c.usable?'可用,吉。':'不可用,立向須避開此線。'),'微調幾度取同山可用分金即可。'],
 d72:c=>['穿山七十二龍(六十甲子+十二空亡格),每格五度,察來龍入首之氣。',c.name?('此格為'+c.name+'龍,納音'+c.nayin+'。'):'此格為空亡格,主氣雜不清。','以納音五行論龍氣與坐山生剋。','吉凶依門派口訣而定,詳見風水學堂。','與透地六十龍互參後定分金。'],
 d60:c=>['透地六十龍,每支宮五龍各六度,甲子起於壬,察入首束氣。','此格為'+c.name+'龍,納音'+c.nayin+'。','以納音配穴場論氣脈。','珠寶火坑之分各派不同,本版不判。','與穿山龍互參,再定分金。']};
function showCard(kind,arg){
  const rows=EX[kind](arg),lbl=['① 這是什麼','② 現在情況','③ 代表什麼','④ 吉凶如何','⑤ 下一步'];
  document.getElementById('cT').textContent=(typeof arg==='string')?arg:(arg.name||'空亡格');
  document.getElementById('cB').innerHTML=rows.map((s,i)=>`<p><span class="lbl">${lbl[i]}:</span>${s}</p>`).join('');
  card.classList.add('show');
}
// 互動
let dragging=false,lastA=null,moved=0;
const pos=e=>{const b=cv.getBoundingClientRect();return[(e.clientX??e.touches[0].clientX)-b.left-W/2,(e.clientY??e.touches[0].clientY)-b.top-W/2]};
const ang=e=>{const[x,y]=pos(e);return Math.atan2(y,x)*180/Math.PI};
cv.addEventListener('pointerdown',e=>{dragging=true;moved=0;lastA=ang(e);cv.setPointerCapture(e.pointerId)});
cv.addEventListener('pointermove',e=>{if(!dragging)return;const a=ang(e);let d=a-lastA;if(d>180)d-=360;if(d<-180)d+=360;
  moved+=Math.abs(d);heading=((heading-d)%360+360)%360;lastA=a;draw()});
cv.addEventListener('pointerup',e=>{dragging=false;
  if(moved<1.2){ // 視為點擊 → 命中測試
    const[x,y]=pos(e);const R=W/2,L=layout();const rr=Math.hypot(x,y)/R;
    const scr=(Math.atan2(x,-y)*180/Math.PI+360)%360;
    const az=((scr+heading)%360+360)%360;
    if(rr>=L.m24[0]&&rr<L.m24[1]){showCard('m24',M24S[Math.floor((((az-337.5)%360)+360)%360/15)]);return}
    if(rr<L.m24[0]&&rr>=L.bagua-.09){const BG=['坎','艮','震','巽','離','坤','兌','乾'];
      showCard('bagua',BG[Math.floor((((az+22.5)%360))/45)]);return}
    for(const ring of L.rings){if(rr>=ring.r[0]&&rr<ring.r[1]){showCard(ring.key,cellAt(ring.cells,ring.anchor,ring.span,az));return}}
  }});
document.getElementById('slider').oninput=e=>{heading=+e.target.value;draw()};
document.getElementById('num').onchange=e=>{heading=((+e.target.value)%360+360)%360;draw()};
document.getElementById('mFac').onclick=e=>{isFacing=true;e.target.classList.add('on');document.getElementById('mSit').classList.remove('on');draw()};
document.getElementById('mSit').onclick=e=>{isFacing=false;e.target.classList.add('on');document.getElementById('mFac').classList.remove('on');draw()};
document.querySelectorAll('.mchip').forEach(b=>b.onclick=()=>{mode=b.dataset.m;
  document.querySelectorAll('.mchip').forEach(x=>x.classList.remove('on'));b.classList.add('on');draw()});
const ps=document.getElementById('period');
for(let i=1;i<=9;i++)ps.add(new Option(i+'運'+(i===9?'(現值)':''),i));ps.value=9;
ps.onchange=e=>{period=+e.target.value;draw()};
draw();
</script></body></html>
