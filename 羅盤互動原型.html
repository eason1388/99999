.seg button.on{background:var(--gold);color:#141110;font-weight:700}

.panel h2{font-family:'Noto Serif TC',serif;font-size:17px;color:var(--gold);letter-spacing:.1em;margin-bottom:10px}
.grid9{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cell{background:#221E19;border-radius:12px;padding:8px 4px;text-align:center;border:1.5px solid transparent}
.cell.sit{border-color:#7FA0C0}.cell.fac{border-color:var(--red)}
.cell .pn{font-size:11.5px;color:var(--dim)}

.cell .st .w{color:var(--gold)}
.cell .bz{font-size:12px;border-radius:99px;display:inline-block;padding:1px 9px;margin-top:3px}

.dir span{font-size:12.5px}

  const BG=[['坎',0],['艮',45],['震',90],['巽',135],['離',180],['坤',225],['兌',270],['乾',315]];
  for(const[n,d]of BG){const scr=(d-heading+360)%360;const flip=scr>90&&scr<270;
    ctx.save();ctx.rotate((d+(flip?180:0))*Math.PI/180);
    ctx.fillStyle='rgba(237,231,218,.55)';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=R*0.058+'px "Noto Serif TC",serif';
    ctx.fillText(n,0,(flip?1:-1)*R*0.47);ctx.restore();}
  ctx.restore();
  // 指向標(頂端紅箭頭,同 iOS)
  ctx.fillStyle='#E07A6A';
  ctx.beginPath();ctx.moveTo(0,-R+3);ctx.lineTo(-8,-R+22);ctx.lineTo(8,-R+22);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(237,231,218,.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-R*0.56);ctx.lineTo(0,R*0.56);ctx.moveTo(-R*0.56,0);ctx.lineTo(R*0.56,0);ctx.stroke();
  ctx.restore();
  update();
}
function interp(d){
  const M='壬子癸丑艮寅甲卯乙辰巽巳丙午丁未坤申庚酉辛戌乾亥';
  const i=Math.floor((((d-337.5)%360)+360)%360/15),m=M[i],opp=M[(i+12)%24];
  const center=(337.5+i*15+7.5)%360;let lean=d-center;if(lean>180)lean-=360;if(lean<-180)lean+=360;
  const toB=Math.min(((d-337.5)%15+15)%15,15-(((d-337.5)%15+15)%15));
  const fj=cellAt(DATA.fenjin,337.5,3,d);
  return{m,opp,lean,toB,fj,nb:M[(i+(lean>=0?1:23))%24]};
}
const QZH={wang:'旺',xiang:'相',gu:'孤',xu:'虛',kongWang:'龜甲空亡'};
function update(){
  const r=interp(heading);
  const sit=isFacing?r.opp:r.m, fac=isFacing?r.m:r.opp;
  document.getElementById('big').textContent=heading.toFixed(1)+'°';
  document.getElementById('title').textContent=sit+'山'+fac+'向';
  const t=[];
  t.push([Math.abs(r.lean)<=3?'✓ 正向':'兼'+(isFacing?r.nb:r.nb)+' '+Math.abs(r.lean).toFixed(1)+'°'+(Math.abs(r.lean)>4.5?'(須替卦)':''),Math.abs(r.lean)<=3?'good':'']);
  t.push(['分金 '+r.fj.name+'('+QZH[r.fj.quality]+')',r.fj.usable?'good':'warn']);
  if(r.toB<1)t.push(['⚠ 騎縫線,微調避開','warn']);
  if(r.fj.quality==='kongWang')t.push(['⚠ 空亡線','warn']);
  document.getElementById('tags').innerHTML=t.map(([s,c])=>`<span class="tag ${c}">${s}</span>`).join('');
  document.getElementById('slider').value=heading.toFixed(1);
  document.getElementById('num').value=heading.toFixed(1);
  // 飛星
  const c=xkChart(period,sit);
  const GRID=[['巽','離','坤'],['震','中','兌'],['艮','坎','乾']];
  const sp=palaceOf(sit),fp=palaceOf(fac),zhai=palaceOf(sit);
  const hi=n=>n===period?'<span class="w">'+n+'</span>':n;
  document.getElementById('g9').innerHTML=GRID.flat().map(p=>{
    const yx=p==='中'?'':youxing(zhai,p);const ji=yx&&'生氣天醫延年伏位'.includes(yx);
    return `<div class="cell ${p===sp?'sit':p===fp?'fac':''}"><div class="pn">${p}${p==='中'?'宮':'・'+(DIRZH[p]||'')}</div>
    <div class="st">${hi(c.mountain[p])}${hi(c.facing_stars[p])}</div>
    ${yx?`<div class="bz ${ji?'j':'x'}">${yx}</div>`:''}</div>`}).join('');
  document.getElementById('pattNote').innerHTML='<b style="color:var(--gold)">'+period+'運・'+c.pattern+'</b> — '+PATT_TXT[c.pattern]
    +(c.sanban?'另成'+c.sanban+',吉。':'')+(c.warnings.length?' ⚠ '+c.warnings.join('、')+'。':'');
  // 八宅方位卡
  const order=['坎','艮','震','巽','離','坤','兌','乾'];
  document.getElementById('dirs').innerHTML=order.map(g=>{
    const yx=youxing(zhai,g);const ji='生氣天醫延年伏位'.includes(yx);
    return `<div class="dir" style="border:1px solid ${ji?'rgba(143,196,154,.35)':'rgba(224,122,106,.3)'}">
    <span style="color:var(--dim)">${DIRZH[g]}</span><b style="color:${ji?'var(--green)':'var(--red)'}">${yx}</b></div>`}).join('');
  // 進階
  document.getElementById('adv').innerHTML=
    `<div class="row2"><span>宅卦</span><b>${zhai}宅(${'坎離震巽'.includes(zhai)?'東四宅':'西四宅'})</b></div>
     <div class="row2"><span>旺財方(向星${period}所到)</span><b>${DIRZH[Object.keys(c.facing_stars).find(p=>p!=='中'&&c.facing_stars[p]===period)]||'—'}</b></div>
     <div class="row2"><span>旺丁方(山星${period}所到)</span><b>${DIRZH[Object.keys(c.mountain).find(p=>p!=='中'&&c.mountain[p]===period)]||'—'}</b></div>
     <div class="row2"><span>城門</span><b>${c.gates.map(g=>g.palace+'宮'+(g.usable?'可用':'不可用')).join('・')}</b></div>`;
  const ys=(11-2026%9-1+9)%9+1;const ch=fly(ys);
  const wh=Object.keys(ch).find(p=>ch[p]===5);
  document.getElementById('yearNote').textContent='流年提醒(2026):五黃到'+(DIRZH[wh]||wh)+',該方忌動土修造;太歲在午(南)、歲破在子(北)。';
}
// 互動
let dragging=false,lastA=null;
const ang=e=>{const b=cv.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-b.left-W/2;const y=(e.touches?e.touches[0].clientY:e.clientY)-b.top-W/2;return Math.atan2(y,x)*180/Math.PI};
cv.addEventListener('pointerdown',e=>{dragging=true;lastA=ang(e);cv.setPointerCapture(e.pointerId)});
cv.addEventListener('pointermove',e=>{if(!dragging)return;const a=ang(e);let d=a-lastA;if(d>180)d-=360;if(d<-180)d+=360;heading=((heading-d)%360+360)%360;lastA=a;draw()});
cv.addEventListener('pointerup',()=>dragging=false);
document.getElementById('slider').oninput=e=>{heading=+e.target.value;draw()};
document.getElementById('num').onchange=e=>{heading=((+e.target.value)%360+360)%360;draw()};
document.getElementById('mFac').onclick=e=>{isFacing=true;e.target.classList.add('on');document.getElementById('mSit').classList.remove('on');draw()};
document.getElementById('mSit').onclick=e=>{isFacing=false;e.target.classList.add('on');document.getElementById('mFac').classList.remove('on');draw()};
const ps=document.getElementById('period');
for(let i=1;i<=9;i++)ps.add(new Option(i+'運'+(i===9?'(現值)':''),i));ps.value=9;
ps.onchange=e=>{period=+e.target.value;draw()};
draw();
</script></body></html>
