<title>Master Feng Shui Compass — 批次 7.3 互動原型</title>
<style>
:root{--paper:#FAF7F2;--card:#F1ECE2;--gold:#8C6D3F;--ink:#2B2620;--red:#A63A2E;--green:#4A6B4F;--blue:#3E5C76}

.sub{font-size:12px;opacity:.6;margin-bottom:10px}
.chips{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.chip{border:1px solid var(--gold);border-radius:999px;padding:6px 14px;font-size:14px;cursor:pointer;background:transparent;color:var(--ink)}
.chip.on{background:var(--gold);color:#fff}
#wrap{position:relative;touch-action:none}
canvas{display:block;cursor:grab}
#bar{width:min(720px,94vw);background:var(--card);border-radius:16px;padding:12px 16px;margin-top:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
#big{font-family:"Noto Serif TC",serif;font-size:26px;font-weight:700}
.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.tag{border-radius:999px;padding:3px 12px;font-size:13px;background:#fff;border:1px solid #ddd}
.tag.warn{background:rgba(166,58,46,.12);border-color:var(--red);color:var(--red)}
.tag.good{background:rgba(74,107,79,.12);border-color:var(--green);color:var(--green)}
#ctrl{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
input[type=range]{width:220px;accent-color:var(--gold)}
input[type=number]{width:80px;padding:4px;border:1px solid var(--gold);border-radius:8px;background:transparent;font-size:15px}
#card{position:fixed;left:50%;bottom:-100%;transform:translateX(-50%);width:min(560px,94vw);background:var(--card);border-radius:24px 24px 0 0;padding:20px 24px;box-shadow:0 -4px 24px rgba(0,0,0,.18);transition:bottom .3s cubic-bezier(.33,1,.68,1);z-index:9}
#card.show{bottom:0}
#card h2{font-family:"Noto Serif TC",serif;color:var(--gold);font-size:20px;margin-bottom:8px}
#card p{font-size:14.5px;line-height:1.6;margin:5px 0}
#card .lbl{color:var(--gold);font-weight:600}
#card button{margin-top:10px;border:none;background:var(--gold);color:#fff;border-radius:999px;padding:8px 18px;font-size:14px;cursor:pointer}
.hint{font-size:12px;opacity:.55;margin-top:8px}

function rings(){
  const r24={code:'m24',in:.30,out:.46,cells:[...Array(24)].map((_,i)=>({name:M24[i],start:(337.5+15*i)%360,end:(352.5+15*i)%360})),font:.055};

function draw(){
  const R=W/2; ctx.clearRect(0,0,W,W); ctx.save(); ctx.translate(R,R);
  ctx.beginPath();ctx.arc(0,0,R-2,0,7);ctx.fillStyle='#FDFBF7';ctx.fill();
  ctx.strokeStyle='#8C6D3F';ctx.lineWidth=2;ctx.stroke();
  ctx.save(); ctx.rotate(-heading*Math.PI/180);
  for(const ring of rings()){
    const ri=ring.in*R, ro=ring.out*R;
    ctx.strokeStyle='rgba(140,109,63,.5)';ctx.lineWidth=.8;
    ctx.beginPath();ctx.arc(0,0,ri,0,7);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,ro,0,7);ctx.stroke();
    for(const c of ring.cells){
      const a0=(c.start-90)*Math.PI/180;
      ctx.beginPath();ctx.moveTo(Math.cos(a0)*ri,Math.sin(a0)*ri);ctx.lineTo(Math.cos(a0)*ro,Math.sin(a0)*ro);ctx.stroke();
      if(mode==='expert'&&c.q){
        const col=(c.q==='wang'||c.q==='xiang')?'rgba(74,107,79,.20)':(c.q==='kongWang'?'rgba(166,58,46,.20)':'rgba(43,38,32,.07)');
        const sweep=((c.end-c.start+360)%360)*Math.PI/180;
        ctx.beginPath();ctx.arc(0,0,ro,a0,a0+sweep);ctx.arc(0,0,ri,a0+sweep,a0,true);ctx.closePath();
        ctx.fillStyle=col;ctx.fill();
      }
      if(c.name){
        let mid=(c.start+((c.end-c.start+360)%360)/2)%360;
        const flip=mid>90&&mid<270;
        ctx.save();ctx.rotate((mid+(flip?180:0))*Math.PI/180);
        ctx.fillStyle='#2B2620';ctx.textAlign='center';ctx.textBaseline='middle';
        const fs=ring.font*R; ctx.font=(ring.code==='m24'?'700 ':'')+fs+'px "Noto Serif TC",serif';
        const rr=(ri+ro)/2*(flip?1:-1);
        if(ring.vert){const chars=c.name.split('');const lh=fs*1.05;const off=-(chars.length-1)*lh/2;
          chars.forEach((ch,i)=>ctx.fillText(ch,0,rr+(off+i*lh)*(flip?-1:1)));
        }else ctx.fillText(c.name,0,rr);
        ctx.restore();
      }
    }
  }

  ctx.beginPath();ctx.arc(0,0,R*.13,0,7);ctx.fillStyle='#F1ECE2';ctx.fill();ctx.strokeStyle='#8C6D3F';ctx.stroke();

  ctx.restore();
  updateBar();
}

function cellAt(cells,anchor,span,d){return cells[Math.floor((((d-anchor)%360)+360)%360/span)]}
function interpret(d){
  const mi=Math.floor((((d-337.5)%360)+360)%360/15), m=M24[mi];
  const opp=M24[(mi+12)%24];
  const sit=isSitting?m:opp, fac=isSitting?opp:m;
  const center=(337.5+mi*15+7.5)%360;
  let lean=d-center; if(lean>180)lean-=360; if(lean<-180)lean+=360;
  const nb=M24[(mi+(lean>=0?1:23))%24];
  const fj=cellAt(DATA.fenjin,337.5,3,d), d72=cellAt(DATA.d72,345,5,d), d60=cellAt(DATA.d60,345,6,d);
  const toB=Math.min(((d-337.5)%15+15)%15,15-(((d-337.5)%15+15)%15));
  return {title:sit+'山'+fac+'向',lean,pure:Math.abs(lean)<=3,tigua:Math.abs(lean)>4.5,
          qifeng:toB<1,fj,d72,d60,leanTo:isSitting?nb:M24[(M24.indexOf(nb)+12)%24]};
}
function updateBar(){
  const r=interpret(heading);
  document.getElementById('big').textContent=heading.toFixed(1)+'°  '+r.title;
  const t=[];
  t.push(r.pure?['正向','good']:['兼'+r.leanTo+' '+Math.abs(r.lean).toFixed(1)+'°'+(r.tigua?'(玄空須替卦)':''),r.tigua?'warn':'']);
  const q=r.fj.quality;
  t.push(['分金 '+r.fj.name+'('+QZH[q]+(r.fj.usable?'·可用':'·不可用')+')',r.fj.usable?'good':'warn']);
  if(r.qifeng)t.push(['⚠ 騎縫線','warn']);
  if(q==='kongWang')t.push(['⚠ 空亡線','warn']);
  if(q==='gu'||q==='xu')t.push(['⚠ 差錯線','warn']);
  t.push(['穿山 '+(r.d72.name??'空亡格'),r.d72.name?'':'warn']);
  t.push(['透地 '+r.d60.name+'·'+r.d60.nayin,'']);
  document.getElementById('tags').innerHTML=t.map(([s,c])=>`<span class="tag ${c}">${s}</span>`).join('');

}

 fenjin:c=>['一百二十分金,每格三度,'+c.mountain+'山五分金之一:'+c.name+'(納音'+c.nayin+')。','讀數落在'+c.name+'分金。','口訣:丙丁旺、庚辛相為珠寶可用;甲乙孤、壬癸虛為差錯;戊己為龜甲空亡。','本格屬「'+QZH[c.q]+'」,'+((c.q==='wang'||c.q==='xiang')?'可用,吉。':'不可用,立向須避開。'),'微調度數避開差錯空亡,取同山可用分金。'],
 d72:c=>['穿山七十二龍(六十甲子+十二空亡格),每格五度,察來龍入首之氣。',c.name?('目前落'+c.name+'龍(納音'+c.nayin+')。'):'目前落空亡格,主氣雜不清。','以納音五行論龍氣生剋。','吉凶依納音與坐山生剋、門派口訣而定(留待門派包)。','配合透地六十龍與分金綜合定奪。'],
 d60:c=>['透地六十龍,每支宮五龍各六度,甲子起壬,察入首束氣。','目前落'+c.name+'龍(納音'+c.nayin+')。','以納音配穴場論氣脈。','珠寶火坑之分各派不同,本原型不判(pending_expert)。','與穿山龍互參,再定分金。'],
 bagua:c=>['後天八卦「'+c.name+'」宮。','讀數落在'+c.name+'宮(45°)。','八宅、飛星皆以八宮為分析框架。','宮位吉凶依宅卦遊星與飛星組合而定。','切換八宅/飛星模式查看本宮吉凶。']};
function showCard(ringCode,c){
  document.getElementById('cTitle').textContent=(c.name??'空亡格');
  const rows=EX[ringCode](c),lbl=['① 這是什麼','② 現在指到','③ 代表什麼','④ 吉凶如何','⑤ 下一步'];
  document.getElementById('cBody').innerHTML=rows.map((s,i)=>`<p><span class="lbl">${lbl[i]}:</span>${s}</p>`).join('');
  card.classList.add('show');
}
// ── 互動 ──
let lastA=null;
function ang(e){const b=cv.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-b.left-W/2;const y=(e.touches?e.touches[0].clientY:e.clientY)-b.top-W/2;return Math.atan2(y,x)*180/Math.PI}
function pos(e){const b=cv.getBoundingClientRect();return[(e.touches?e.touches[0].clientX:e.clientX)-b.left-W/2,(e.touches?e.touches[0].clientY:e.clientY)-b.top-W/2]}
cv.addEventListener('pointerdown',e=>{dragging=true;lastA=ang(e);vel=0;cv.setPointerCapture(e.pointerId)});
cv.addEventListener('pointermove',e=>{if(!dragging)return;const a=ang(e);let d=a-lastA;if(d>180)d-=360;if(d<-180)d+=360;heading=((heading-d)%360+360)%360;vel=-d;lastA=a;draw()});
cv.addEventListener('pointerup',e=>{
  dragging=false;
  if(Math.abs(vel)>.6){const decay=()=>{vel*=.94;heading=((heading+ -vel)%360+360)%360;draw();if(Math.abs(vel)>.05&&!dragging)requestAnimationFrame(decay)};requestAnimationFrame(decay)}
  else{const[x,y]=pos(e);const rr=Math.hypot(x,y)/(W/2);
    const scr=(Math.atan2(x,-y)*180/Math.PI+360)%360;
    const az=((scr+heading)%360+360)%360;
    for(const ring of rings()){if(rr>=ring.in&&rr<ring.out){
      const span=360/ring.cells.length;
      const anchor=ring.cells[0].start;
      showCard(ring.code,cellAt(ring.cells,anchor,span,az));break}}}
});
document.getElementById('slider').oninput=e=>{heading=+e.target.value;draw()};
document.getElementById('num').onchange=e=>{heading=((+e.target.value)%360+360)%360;draw()};
document.getElementById('north').onclick=()=>{heading=0;draw()};
document.querySelectorAll('#modes .chip[data-m]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#modes .chip[data-m]').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');mode=b.dataset.m;draw()});
document.getElementById('sitBtn').onclick=e=>{isSitting=!isSitting;e.target.textContent='量測:'+(isSitting?'坐':'向')+' ▾';draw()};
draw();
</script></body></html>
